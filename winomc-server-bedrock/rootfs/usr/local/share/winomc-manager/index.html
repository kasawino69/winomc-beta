<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="winomc-manager-ui" content="phase3">
  <title>WinoMC 2.1b Manager</title>
  <link rel="stylesheet" href="./assets/winomc-manager/styles/base.css">
  <link rel="stylesheet" href="./assets/winomc-manager/styles/pc-classic.css" media="(min-width: 821px)">
  <link rel="stylesheet" href="./assets/winomc-manager/styles/mobile.css" media="(max-width: 820px)">
  <link rel="stylesheet" href="./assets/winomc-manager/styles/desktop.css">
</head>
<body class="mode-pc-classic" data-supported-modes="mode-pc-classic mode-mobile mode-desktop">
  <div id="app" class="wm-shell" data-manager-app>
    <header class="wm-topbar">
      <div>
        <p class="wm-kicker">Home Assistant Add-on · Bedrock Multiinstanz</p>
        <h1>WinoMC Manager</h1>
      </div>
      <div class="wm-mode-switch" aria-label="UI-Modus">
        <button type="button" data-mode="pc-classic">PC Classic</button>
        <button type="button" data-mode="mobile">Mobile</button>
        <button type="button" data-mode="desktop">Desktop</button>
      </div>
    </header>

    <main class="wm-layout">
      <section class="wm-panel wm-dashboard" aria-labelledby="dashboardTitle">
        <div class="wm-section-head">
          <div>
            <p class="wm-kicker">Dashboard</p>
            <h2 id="dashboardTitle">Instanzen</h2>
          </div>
          <button class="wm-primary" type="button" id="refreshInstances">Aktualisieren</button>
        </div>
        <div id="managerSummary" class="wm-summary">Manager wird geladen…</div>
        <div id="instancesGrid" class="wm-instance-grid" aria-live="polite"></div>
      </section>

      <aside class="wm-panel wm-create" aria-labelledby="createTitle">
        <p class="wm-kicker">Neue Instanz</p>
        <h2 id="createTitle">Bedrock-Instanz erstellen</h2>
        <form id="createInstanceForm" class="wm-form">
          <label>Instanz-ID <input name="id" required pattern="[a-z0-9][a-z0-9_-]{1,31}" placeholder="survival"></label>
          <label>Anzeigename <input name="name" required placeholder="Survival Server"></label>
          <label>Profil <select name="profile" id="profileSelect"></select></label>
          <label>IPv4-Port <input name="server_port" type="number" min="1" max="65535" value="19132"></label>
          <label>IPv6-Port <input name="server_port_v6" type="number" min="1" max="65535" value="19133"></label>
          <label>Weltname <input name="level_name" value="world"></label>
          <label>Gamemode <select name="gamemode"><option>survival</option><option>creative</option><option>adventure</option></select></label>
          <label>Difficulty <select name="difficulty"><option>peaceful</option><option>easy</option><option selected>normal</option><option>hard</option></select></label>
          <label>Max Players <input name="max_players" type="number" min="1" max="100" value="10"></label>
          <label class="wm-check"><input name="allowlist" type="checkbox"> Allowlist aktivieren</label>
          <button class="wm-primary" type="submit">Instanz erstellen</button>
        </form>
      </aside>

      <section class="wm-panel wm-detail" aria-labelledby="detailTitle">
        <div class="wm-section-head">
          <div>
            <p class="wm-kicker">Ausgewählte Instanz</p>
            <h2 id="detailTitle">Noch keine Instanz ausgewählt</h2>
          </div>
          <div id="detailActions" class="wm-actions"></div>
        </div>
        <nav class="wm-tabs" aria-label="Instanzbereiche">
          <button data-tab="overview" class="active">Übersicht</button>
          <button data-tab="console">Konsole</button>
          <button data-tab="settings">Einstellungen</button>
          <button data-tab="files">Dateien</button>
          <button data-tab="packs">Packs</button>
          <button data-tab="backups">Backups</button>
          <button data-tab="diagnostics">Logs/Diagnose</button>
        </nav>
        <div id="detailContent" class="wm-detail-content">Wähle eine Instanz aus dem Dashboard.</div>
      </section>
    </main>

    <section id="errorPanel" class="wm-error-panel" aria-live="assertive" hidden></section>
  </div>
  <script type="module" src="./assets/winomc-manager/manager.js"></script>
</body>
</html>
