<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>WinoMC Manager 2.1.3b</title>
  <link rel="stylesheet" href="assets/winomc-manager/styles/base.css">
  <link rel="stylesheet" href="assets/winomc-manager/styles/pc-classic.css">
  <link rel="stylesheet" href="assets/winomc-manager/styles/mobile.css">
  <link rel="stylesheet" href="assets/winomc-manager/styles/desktop.css">
</head>
<body class="mode-pc-classic">
  <header class="manager-header">
    <div>
      <p class="eyebrow">Home Assistant Add-on · Bedrock Multiinstanz</p>
      <h1>WinoMC Manager 2.1.3b</h1>
      <p id="managerSummary">Manager wird geladen…</p>
    </div>
    <nav class="mode-switcher" aria-label="Ansichtsmodus">
      <button type="button" data-mode="pc-classic">PC Classic</button>
      <button type="button" data-mode="mobile">Mobile</button>
      <button type="button" data-mode="desktop">Desktop</button>
    </nav>
  </header>

  <main class="manager-shell">
    <section class="dashboard-panel">
      <div class="panel-heading">
        <div>
          <p class="eyebrow">Dashboard</p>
          <h2>Instanzen</h2>
        </div>
        <button type="button" id="refreshInstances">Aktualisieren</button>
      </div>
      <div id="instancesGrid" class="instances-grid" aria-live="polite">Manager wird geladen…</div>
    </section>

    <aside class="create-panel">
      <p class="eyebrow">Neue Instanz</p>
      <h2>Bedrock-Instanz erstellen</h2>
      <form id="createInstanceForm" class="form-grid">
        <label>Instanz-ID<input name="id" autocomplete="off" required placeholder="survival"></label>
        <label>Anzeigename<input name="name" autocomplete="off" placeholder="Survival"></label>
        <label>Profil<select id="profileSelect" name="profile"></select></label>
        <label>IPv4-Port<input name="server_port" type="number" min="1024" max="65535" value="19132" required></label>
        <label>IPv6-Port<input name="server_port_v6" type="number" min="1024" max="65535" value="19133" required></label>
        <label>Weltname<input name="level_name" autocomplete="off" value="world"></label>
        <label>Gamemode
          <select name="gamemode">
            <option value="survival">survival</option>
            <option value="creative">creative</option>
            <option value="adventure">adventure</option>
          </select>
        </label>
        <label>Difficulty
          <select name="difficulty">
            <option value="peaceful">peaceful</option>
            <option value="easy">easy</option>
            <option value="normal" selected>normal</option>
            <option value="hard">hard</option>
          </select>
        </label>
        <label>Max Players<input name="max_players" type="number" min="1" max="100" value="10"></label>
        <label class="checkbox-row"><input name="allowlist" type="checkbox"> Allowlist aktivieren</label>
        <button type="submit" class="primary">Instanz erstellen</button>
      </form>
    </aside>

    <section class="details-panel">
      <div class="panel-heading">
        <div>
          <p class="eyebrow">Ausgewählte Instanz</p>
          <h2 id="detailTitle">Noch keine Instanz ausgewählt</h2>
        </div>
        <div id="detailActions" class="detail-actions"></div>
      </div>
      <div class="tabs" role="tablist" aria-label="Instanzbereiche">
        <button type="button" data-tab="overview" class="active">Übersicht</button>
        <button type="button" data-tab="console">Konsole</button>
        <button type="button" data-tab="settings">Einstellungen</button>
        <button type="button" data-tab="files">Dateien</button>
        <button type="button" data-tab="packs">Packs</button>
        <button type="button" data-tab="backups">Backups</button>
        <button type="button" data-tab="diagnostics">Logs/Diagnose</button>
      </div>
      <div id="detailContent" class="detail-content">Wähle eine Instanz aus dem Dashboard.</div>
    </section>
  </main>

  <section id="errorPanel" class="error-panel" hidden></section>

  <script src="assets/winomc-manager/manager.js" defer></script>
</body>
</html>
