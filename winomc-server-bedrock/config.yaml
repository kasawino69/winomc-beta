name: "[BETA] WinoMC Bedrock Server"
description: "[BETA] WinoMC 2.1b.1 Manager-only Rebuild"
version: 2.1.5b
slug: winomc-beta
init: false
boot: auto
startup: services
stdin: false
arch:
  - amd64
  - aarch64

host_network: true

ingress: true
ingress_port: 8099
ingress_stream: true
panel_icon: mdi:server-network
panel_title: "[BETA] WinoMC Manager"
panel_admin: true

ports_description:
  8099/tcp: WinoMC Manager Webpanel via Ingress
  19132/udp: Beispiel-Port fÃ¼r eine Bedrock-Instanz, im Manager je Instanz konfigurierbar
  19133/udp: Beispiel-Port fÃ¼r eine zweite Bedrock/IPv6-Instanz, im Manager je Instanz konfigurierbar

options:
  WINOMC_MANAGER_PORT: 8099
  WINOMC_SECURITY_MODE: protected
  WINOMC_LOG_LEVEL: info
  WINOMC_IMPORT_DIR: /share/winomc/import
  WINOMC_EXPORT_DIR: /share/winomc/export
  WINOMC_BACKUP_DIR: /share/winomc/backups
  WINOMC_BACKUP_KEEP: 5
  WINOMC_CONSOLE_HISTORY_LIMIT: 300
  WINOMC_FILE_EDITOR_MAX_BYTES: 2097152
  WINOMC_FILE_UPLOAD_MAX_BYTES: 536870912
  WINOMC_FILE_JSON_UPLOAD_MAX_BYTES: 67108864
  WINOMC_ZIP_UNPACK_MAX_BYTES: 1073741824
  WINOMC_DEBUG_DIAGNOSTICS: false
  TZ: Europe/Berlin

schema:
  WINOMC_MANAGER_PORT: port
  WINOMC_SECURITY_MODE: list(protected|local_only|open)?
  WINOMC_LOG_LEVEL: list(debug|info|warning|error)?
  WINOMC_IMPORT_DIR: str
  WINOMC_EXPORT_DIR: str
  WINOMC_BACKUP_DIR: str
  WINOMC_BACKUP_KEEP: int?
  WINOMC_CONSOLE_HISTORY_LIMIT: int?
  WINOMC_FILE_EDITOR_MAX_BYTES: int?
  WINOMC_FILE_UPLOAD_MAX_BYTES: int?
  WINOMC_FILE_JSON_UPLOAD_MAX_BYTES: int?
  WINOMC_ZIP_UNPACK_MAX_BYTES: int?
  WINOMC_DEBUG_DIAGNOSTICS: bool?
  TZ: str

backup: cold
backup_exclude:
  - "bedrock_server*"
  - "behavior_packs/vanilla*"
  - "behavior_packs/chemistry*"
  - "resource_packs/vanilla*"
  - "resource_packs/chemistry*"
  - ".winomc/bds/*"
  - ".winomc/file_backups/*"
  - "instances/*/runtime/*"

map:
  - addons:rw
  - addon_config:rw
  - share:rw

environment:
  EULA: "TRUE"
  WINOMC_VERSION: "2.1.5b"
  WINOMC_CONSOLE_PORT: "8099"
  WINOMC_MANAGER_UI_DIR: "/usr/local/share/winomc-manager"
  WINOMC_CONSOLE_ALLOWED_PROXIES: "172.30.32.2,127.0.0.1,::1"

