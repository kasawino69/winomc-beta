name: WinoMC Bedrock Server
description: Bedrock Minecraft Server auf Home Assistant
version: 1.3.6
slug: winomc-bedrock
init: false
boot: auto
startup: services
stdin: true
arch:
  - amd64
  - aarch64

host_network: true

ingress: true
ingress_port: 8099
ingress_stream: true
panel_icon: mdi:console
panel_title: WinoMC Console
panel_admin: true

ports_description:
  19132/udp: Minecraft Server Port

options:
  WINOMC_RUNTIME_MODE: itzg
  BDS_DIRECT_DOWNLOAD_URL: ""
  BDS_AUTO_UPDATE: true
  VERSION: LATEST
  SERVER_NAME: WinoMC Server
  LEVEL_NAME: world
  GAMEMODE: survival
  FORCE_GAMEMODE: false
  DIFFICULTY: normal
  ALLOW_CHEATS: false
  MAX_PLAYERS: 10
  ALLOW_LIST: false
  ALLOW_LIST_USERS: ""
  LEVEL_TYPE: DEFAULT
  ONLINE_MODE: true
  ENABLE_LAN_VISIBILITY: true
  VIEW_DISTANCE: 10
  TICK_DISTANCE: 4
  PLAYER_IDLE_TIMEOUT: 30
  MAX_THREADS: 2
  LEVEL_SEED: ""
  DEFAULT_PLAYER_PERMISSION_LEVEL: member
  TEXTUREPACK_REQUIRED: false
  SERVER_AUTHORITATIVE_MOVEMENT: server-auth
  SERVER_AUTHORITATIVE_BLOCK_BREAKING: false
  EMIT_SERVER_TELEMETRY: false
  PLAYER_MOVEMENT_SCORE_THRESHOLD: 20
  PLAYER_MOVEMENT_DISTANCE_THRESHOLD: 0.3
  PLAYER_MOVEMENT_DURATION_THRESHOLD_IN_MS: 500
  CORRECT_PLAYER_MOVEMENT: false
  OPS: ""
  MEMBERS: ""
  VISITORS: ""
  SERVER_PORT: 19132
  SERVER_PORT_V6: 19133
  ENABLE_BDS_V6BIND_FIX: false
  TZ: Europe/Berlin
  PACKAGE_BACKUP_KEEP: 2
  DOWNLOAD_PROGRESS: false
  MC_PACK: ""
  FORCE_WORLD_COPY: false
  FORCE_PACK_COPY: false
  CONTENT_LOG_FILE_ENABLED: false
  CONTENT_LOG_LEVEL: info
  CONTENT_LOG_CONSOLE_OUTPUT_ENABLED: false
  CHAT_RESTRICTION: None
  DISABLE_PLAYER_INTERACTION: false
  DISABLE_PERSONA: false
  DISABLE_CUSTOM_SKINS: false
  MSA_GAMERTAGS_ONLY: false
  VARIABLES: ""
  ENABLE_WEB_CONSOLE: true
  WINOMC_CONSOLE_HISTORY_LIMIT: 300

schema:
  WINOMC_RUNTIME_MODE: list(itzg|native)
  BDS_DIRECT_DOWNLOAD_URL: str
  BDS_AUTO_UPDATE: bool
  VERSION: str
  SERVER_NAME: str
  LEVEL_NAME: str
  GAMEMODE: list(survival|creative|adventure)
  FORCE_GAMEMODE: bool
  DIFFICULTY: list(peaceful|easy|normal|hard)
  ALLOW_CHEATS: bool
  MAX_PLAYERS: int
  ALLOW_LIST: bool
  ALLOW_LIST_USERS: str
  LEVEL_TYPE: list(DEFAULT|FLAT|LEGACY)
  ONLINE_MODE: bool
  ENABLE_LAN_VISIBILITY: bool
  VIEW_DISTANCE: int
  TICK_DISTANCE: int
  PLAYER_IDLE_TIMEOUT: int
  MAX_THREADS: int
  LEVEL_SEED: str
  DEFAULT_PLAYER_PERMISSION_LEVEL: list(member|operator|visitor)
  TEXTUREPACK_REQUIRED: bool
  SERVER_AUTHORITATIVE_MOVEMENT: list(client-auth|server-auth|server-auth-with-rewind)
  SERVER_AUTHORITATIVE_BLOCK_BREAKING: bool
  EMIT_SERVER_TELEMETRY: bool
  PLAYER_MOVEMENT_SCORE_THRESHOLD: int
  PLAYER_MOVEMENT_DISTANCE_THRESHOLD: float
  PLAYER_MOVEMENT_DURATION_THRESHOLD_IN_MS: int
  CORRECT_PLAYER_MOVEMENT: bool
  OPS: str
  MEMBERS: str
  VISITORS: str
  SERVER_PORT: port
  SERVER_PORT_V6: port
  ENABLE_BDS_V6BIND_FIX: bool
  TZ: str
  PACKAGE_BACKUP_KEEP: int
  DOWNLOAD_PROGRESS: bool
  MC_PACK: str
  FORCE_WORLD_COPY: bool
  FORCE_PACK_COPY: bool
  CONTENT_LOG_FILE_ENABLED: bool
  CONTENT_LOG_LEVEL: list(verbose|info|warning|error)
  CONTENT_LOG_CONSOLE_OUTPUT_ENABLED: bool
  CHAT_RESTRICTION: list(None|Dropped|Disabled)
  DISABLE_PLAYER_INTERACTION: bool
  DISABLE_PERSONA: bool
  DISABLE_CUSTOM_SKINS: bool
  MSA_GAMERTAGS_ONLY: bool
  VARIABLES: str
  ENABLE_WEB_CONSOLE: bool
  WINOMC_CONSOLE_HISTORY_LIMIT: int

backup: cold

backup_exclude:
  - "bedrock_server*"
  - "behavior_packs/vanilla*"
  - "behavior_packs/chemistry*"
  - "resource_packs/vanilla*"
  - "resource_packs/chemistry*"
  - ".winomc/bds/*"

map:
  - addon_config:rw
  - addons:rw
  - share:rw

environment:
  EULA: "TRUE"
  WINOMC_CONSOLE_PORT: "8099"
  WINOMC_CONSOLE_ALLOWED_PROXIES: "172.30.32.2,127.0.0.1,::1"
