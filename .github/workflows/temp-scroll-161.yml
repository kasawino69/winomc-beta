name: temp scroll 161
on:
  push:
    branches: [fix-file-scroll-161]
permissions:
  contents: write
jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: fix-file-scroll-161
      - run: |
          python3 - <<'PY'
          from pathlib import Path
          p=Path('winomc-server-bedrock/rootfs/usr/local/bin/winomc-bedrock-entrypoint')
          s=p.read_text()
          needle='''  python3 - <<'PY'\n'''
          repl='''  if [ -x "/usr/local/bin/winomc-patch-console-css" ]; then\n    /usr/local/bin/winomc-patch-console-css\n  fi\n\n  python3 - <<'PY'\n'''
          if '/usr/local/bin/winomc-patch-console-css' not in s:
            s=s.replace(needle,repl,1)
            p.write_text(s)
          PY
          rm -f .github/workflows/temp-scroll-161.yml
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add winomc-server-bedrock/rootfs/usr/local/bin/winomc-bedrock-entrypoint .github/workflows/temp-scroll-161.yml
          git diff --cached --quiet || git commit -m 'Run Webconsole CSS patch on startup'
          git push origin HEAD:fix-file-scroll-161
