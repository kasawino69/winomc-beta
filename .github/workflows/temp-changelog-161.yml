name: temp changelog 161
on:
  push:
    branches: [fix-file-scroll-161]
permissions:
  contents: write
jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: fix-file-scroll-161
      - run: |
          python3 - <<'PY'
          from pathlib import Path
          p=Path('winomc-server-bedrock/CHANGELOG.md')
          s=p.read_text()
          section='''### 1.6.1

* Klassische Dateiexplorer-Ansicht korrigiert: Ordner- und Dateiliste besitzen jetzt eine eigene Scrollhoehe.
* Tabellenkopf der Dateiliste bleibt beim Scrollen sichtbar.
* Explorer- und Editorbereich laufen nicht mehr unter die angedockte Live Console.
* Add-on-Version auf 1.6.1 angehoben, damit Home Assistant die Änderung als Update erkennt.

'''
          if '### 1.6.1' not in s:
            s=s.replace('### 1.6.0\n', section+'### 1.6.0\n',1)
            p.write_text(s)
          PY
          rm -f .github/workflows/temp-changelog-161.yml
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add winomc-server-bedrock/CHANGELOG.md .github/workflows/temp-changelog-161.yml
          git diff --cached --quiet || git commit -m 'Update changelog for 1.6.1'
          git push origin HEAD:fix-file-scroll-161
