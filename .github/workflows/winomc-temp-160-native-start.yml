name: Temporary WinoMC 1.6.0 Native Start Patch

on:
  push:
    branches:
      - feature-framework-optimizations-1-6-0

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feature-framework-optimizations-1-6-0

      - name: Patch native start wrapper
        shell: python
        run: |
          from pathlib import Path
          path = Path('winomc-server-bedrock/rootfs/usr/local/bin/winomc-native-start')
          text = path.read_text(encoding='utf-8')
          text = text.replace('exec box64 ./bedrock_server', 'exec sh /usr/local/bin/winomc-host-optimized-exec box64 ./bedrock_server')
          text = text.replace('exec ./bedrock_server', 'exec sh /usr/local/bin/winomc-host-optimized-exec ./bedrock_server')
          path.write_text(text, encoding='utf-8')

      - name: Remove temporary workflow
        run: rm -f .github/workflows/winomc-temp-160-native-start.yml

      - name: Commit patch
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add winomc-server-bedrock/rootfs/usr/local/bin/winomc-native-start .github/workflows/winomc-temp-160-native-start.yml
          git diff --cached --quiet && exit 0
          git commit -m 'Use host optimized exec for Bedrock runtime'
          git push origin HEAD:feature-framework-optimizations-1-6-0
